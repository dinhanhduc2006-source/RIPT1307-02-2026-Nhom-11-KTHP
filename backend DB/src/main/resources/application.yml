server:
  port: 8080

spring:
  application:
    name: equipment-borrow
  datasource:
    url: jdbc:mysql://localhost:3306/equipment_borrow?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ThayChuoiBiMatDaiItNhat32KyTuChoAnToan123456
    expiration-ms: 86400000
